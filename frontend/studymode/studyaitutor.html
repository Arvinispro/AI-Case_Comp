<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study AI Tutor</title>
  <link rel="stylesheet" href="/frontend/studymode/studyaitutor.css" />
  <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="screen">
    <div class="top-section">
      <div class="time-bar">
        <div class="time-fill"></div>
      </div>
      <div class="timer">00:00</div>
      <button class="session-back-btn" id="sessionBackBtn" type="button">Back</button>
    </div>

    <div class="main-content">
      <div class="pdf-panel">
        <div class="material-tabs" id="materialTabs"></div>
        <div class="pdf-placeholder" id="pdfPlaceholder"></div>
      </div>

      <div class="right-panel">
        <div class="character-section">
          <div class="ai-character">
            <img src="https://via.placeholder.com/120" alt="AI character">
          </div>
        </div>

        <div class="chat-box" id="chatBox">
          <div class="chat-messages" id="chatMessages"></div>
        </div>

        <div class="input-area">
          <textarea id="chatInput" placeholder="Start typing..."></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Send">↑</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const pdfPlaceholder = document.getElementById("pdfPlaceholder");
    const materialTabs = document.getElementById("materialTabs");
    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const sendBtn = document.getElementById("sendBtn");
    const sessionBackBtn = document.getElementById("sessionBackBtn");
    const timerText = document.querySelector(".timer");
    const timerFill = document.querySelector(".time-fill");
    const SUMMARY_URL = "/frontend/summary/summary.html";
    const ACCOUNT_URL = "/account";
    const SESSION_REWARD_KEY = "session_reward_summary";
    const ACTIVE_TIMER_KEY = "active_session_timer";
    const STUDY_SCHEDULE_KEY = "study_session_schedule";
    const PENDING_TIMER_KEY = "pending_timer_setup";

    let materials = [];
    let activeMaterialIndex = 0;
    let sessionTimerInterval = null;
    let hasSessionEnded = false;

    function getAuthToken() {
      return localStorage.getItem("auth_token");
    }

    function getStudySession() {
      const raw = sessionStorage.getItem("study_mode_session");
      if (!raw) {
        return null;
      }
      try {
        return JSON.parse(raw);
      } catch (_) {
        return null;
      }
    }

    function getSessionMaterialFiles() {
      const session = getStudySession();
      return Array.isArray(session?.materialFiles) ? session.materialFiles : [];
    }

    function getStudyCourseId() {
      const session = getStudySession();
      return session?.courseId || null;
    }

    function formatScheduleForChat(scheduleData) {
      const items = Array.isArray(scheduleData?.schedule_items) ? scheduleData.schedule_items : [];
      if (!items.length) {
        return null;
      }

      const lines = items.map((item, index) => {
        const duration = Math.max(1, Number(item?.duration_minutes || 0));
        const activityType = String(item?.activity_type || "work").toUpperCase();
        const activity = String(item?.activity || "");
        return `${index + 1}. ${duration} minutes — ${activityType}: ${activity}`;
      });

      return `Your study schedule is ready:\n${lines.join("\n")}`;
    }

    function formatDuration(totalSeconds) {
      const safe = Math.max(0, Math.floor(totalSeconds));
      const hours = Math.floor(safe / 3600);
      const minutes = Math.floor((safe % 3600) / 60);
      const seconds = safe % 60;

      if (hours > 0) {
        return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function startSessionTimer() {
      if (!timerText || !timerFill) {
        return;
      }

      const session = getStudySession();
      const timer = session?.timer || null;
      const durationSeconds = Number(timer?.durationSeconds || 0);
      const startedAtMs = Date.parse(timer?.startedAt || "");
      const endsAtMs = Date.parse(timer?.endsAt || "");

      if (!Number.isFinite(durationSeconds) || durationSeconds <= 0 || !Number.isFinite(endsAtMs) || !Number.isFinite(startedAtMs)) {
        timerText.textContent = "00:00 / 00:00";
        timerFill.style.width = "0%";
        return;
      }

      const finalizeSession = () => {
        if (hasSessionEnded) {
          return;
        }
        hasSessionEnded = true;

        const awardedMinutes = Math.max(1, Number(timer?.durationMinutes) || Math.ceil(durationSeconds / 60));
        const rewardId = `study-${timer?.startedAt || Date.now()}-${durationSeconds}`;

        sessionStorage.setItem(SESSION_REWARD_KEY, JSON.stringify({
          mode: "study",
          durationMinutes: awardedMinutes,
          xpAwarded: awardedMinutes,
          rewardId,
          completedAt: new Date().toISOString()
        }));

        sessionStorage.removeItem("study_mode_session");
        sessionStorage.removeItem(ACTIVE_TIMER_KEY);
        window.location.href = SUMMARY_URL;
      };

      const tick = () => {
        const nowMs = Date.now();
        const elapsedByStart = Math.max(0, Math.floor((nowMs - startedAtMs) / 1000));
        const elapsedByEnd = Math.max(0, durationSeconds - Math.ceil((endsAtMs - nowMs) / 1000));
        const elapsedSeconds = Math.min(durationSeconds, Math.max(elapsedByStart, elapsedByEnd));
        const progressPercent = Math.max(0, Math.min(100, (elapsedSeconds / durationSeconds) * 100));

        timerText.textContent = `${formatDuration(elapsedSeconds)} / ${formatDuration(durationSeconds)}`;
        timerFill.style.width = `${progressPercent}%`;

        if (elapsedSeconds >= durationSeconds) {
          if (sessionTimerInterval) {
            clearInterval(sessionTimerInterval);
            sessionTimerInterval = null;
          }
          finalizeSession();
        }
      };

      tick();
      sessionTimerInterval = window.setInterval(tick, 1000);
    }

    function exitSessionWithoutReward() {
      hasSessionEnded = true;
      if (sessionTimerInterval) {
        clearInterval(sessionTimerInterval);
        sessionTimerInterval = null;
      }

      sessionStorage.removeItem("study_mode_session");
      sessionStorage.removeItem(ACTIVE_TIMER_KEY);
      sessionStorage.removeItem(SESSION_REWARD_KEY);
      sessionStorage.removeItem(STUDY_SCHEDULE_KEY);
      sessionStorage.removeItem(PENDING_TIMER_KEY);

      window.location.href = ACCOUNT_URL;
    }

    function appendChatMessage(role, text) {
      const item = document.createElement("div");
      item.className = `chat-message chat-message-${role}`;

      const bubble = document.createElement("div");
      bubble.className = "chat-bubble";
      bubble.textContent = text;

      item.appendChild(bubble);
      chatMessages.appendChild(item);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function getFileExtension(name = "") {
      const parts = name.toLowerCase().split(".");
      return parts.length > 1 ? parts.pop() : "";
    }

    function escapeHtml(value = "") {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderMaterialTabs() {
      materialTabs.innerHTML = "";
      if (!materials.length) {
        return;
      }

      materials.forEach((material, index) => {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = `material-tab${index === activeMaterialIndex ? " is-active" : ""}`;
        tab.textContent = material.filename || "Material";
        tab.addEventListener("click", () => {
          activeMaterialIndex = index;
          renderMaterialTabs();
          renderMaterialViewer();
        });
        materialTabs.appendChild(tab);
      });
    }

    function renderMaterialViewer() {
      if (!materials.length) {
        pdfPlaceholder.textContent = "Study materials will appear here.";
        return;
      }

      if (activeMaterialIndex < 0 || activeMaterialIndex >= materials.length) {
        activeMaterialIndex = 0;
      }

      const material = materials[activeMaterialIndex];
      const url = material.storage_url || "";
      const filename = material.filename || "Material";
      const mimeType = (material.mime_type || "").toLowerCase();
      const extension = getFileExtension(filename);

      const isPdf = mimeType.includes("pdf") || extension === "pdf";
      const isImage = mimeType.startsWith("image/") || ["png", "jpg", "jpeg", "gif", "webp"].includes(extension);

      if (!url) {
        pdfPlaceholder.textContent = "Missing file URL";
        return;
      }

      if (isImage) {
        pdfPlaceholder.innerHTML = `<img class="material-image" src="${url}" alt="${escapeHtml(filename)}" />`;
      } else if (isPdf) {
        const viewerUrl = `${url}#toolbar=0&navpanes=0&scrollbar=1&view=FitH`;
        pdfPlaceholder.innerHTML = `<iframe class="material-frame" src="${viewerUrl}" title="${escapeHtml(filename)}"></iframe>`;
      } else {
        pdfPlaceholder.innerHTML = `
          <div class="material-fallback">
            <p>Preview unavailable for this file type.</p>
            <a href="${url}" target="_blank" rel="noopener noreferrer">Open file</a>
          </div>
        `;
      }
    }

    async function loadSessionMaterials() {
      const token = getAuthToken();
      if (!token) {
        materials = [];
        return;
      }

      try {
        const response = await fetch("/api/v1/study/materials/session", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          }
        });

        if (!response.ok) {
          materials = [];
          return;
        }

        const payload = await response.json();
        const loaded = payload?.data || [];
        const wantedNames = getSessionMaterialFiles()
          .map((name) => (name || "").trim().toLowerCase())
          .filter(Boolean);

        if (!wantedNames.length) {
          materials = [];
          return;
        }

        const bucket = new Map();
        loaded.forEach((item) => {
          const key = (item?.filename || "").trim().toLowerCase();
          if (!key) {
            return;
          }
          if (!bucket.has(key)) {
            bucket.set(key, []);
          }
          bucket.get(key).push(item);
        });

        const resolved = [];
        wantedNames.forEach((name) => {
          const items = bucket.get(name) || [];
          if (items.length > 0) {
            resolved.push(items.shift());
          }
        });

        materials = resolved;
      } catch (_) {
        materials = [];
      }
    }

    async function sendChatMessage() {
      const message = chatInput.value.trim();
      if (!message) {
        return;
      }

      const token = getAuthToken();
      if (!token) {
        appendChatMessage("assistant", "Please sign in to chat.");
        return;
      }

      appendChatMessage("user", message);
      chatInput.value = "";
      sendBtn.disabled = true;

      try {
        const response = await fetch("/api/v1/study/chat", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            material_files: getSessionMaterialFiles(),
            course_id: getStudyCourseId()
          })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          const errorMsg = payload?.message || "Chat request failed.";
          appendChatMessage("assistant", errorMsg);
          return;
        }

        const payload = await response.json();
        const reply = payload?.data?.reply || "I could not generate a response right now.";
        appendChatMessage("assistant", reply);
      } catch (_) {
        appendChatMessage("assistant", "Unable to reach the tutor service. Please try again.");
      } finally {
        sendBtn.disabled = false;
        chatInput.focus();
      }
    }

    async function loadSessionSchedule() {
      const token = getAuthToken();
      if (!token) {
        return;
      }

      try {
        const response = await fetch("/api/v1/study/schedule/session", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          }
        });

        if (!response.ok) {
          return;
        }

        const payload = await response.json();
        const data = payload?.data || null;
        if (!data || !Array.isArray(data.schedule_items) || data.schedule_items.length === 0) {
          return;
        }

        sessionStorage.setItem(STUDY_SCHEDULE_KEY, JSON.stringify(data));
        const message = formatScheduleForChat(data);
        if (message) {
          appendChatMessage("assistant", message);
        }
      } catch (_) {
        // ignore schedule fetch failures
      }
    }

    async function init() {
      startSessionTimer();
      await loadSessionSchedule();
      await loadSessionMaterials();
      renderMaterialTabs();
      renderMaterialViewer();
      appendChatMessage("assistant", "Hi, I am your study tutor. Ask me anything about these materials.");
    }

    sendBtn.addEventListener("click", sendChatMessage);
    sessionBackBtn.addEventListener("click", exitSessionWithoutReward);
    chatInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendChatMessage();
      }
    });

    init();
  </script>

</body>

</html>
