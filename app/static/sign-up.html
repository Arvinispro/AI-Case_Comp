<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #1f2937, #111827 60%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #e5e7eb;
      }

      .card {
        width: min(92vw, 420px);
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.4rem;
      }

      p {
        margin: 0 0 18px;
        color: #9ca3af;
        font-size: 0.95rem;
      }

      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 0.9rem;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #4b5563;
        border-radius: 10px;
        background: #111827;
        color: #f9fafb;
        font-size: 0.95rem;
      }

      input:focus {
        outline: none;
        border-color: #60a5fa;
        box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
      }

      button {
        width: 100%;
        margin-top: 16px;
        padding: 11px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(90deg, #3b82f6, #2563eb);
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .status {
        margin-top: 14px;
        padding: 10px;
        border-radius: 10px;
        font-size: 0.9rem;
        display: none;
      }

      .status.success {
        display: block;
        background: rgba(16, 185, 129, 0.12);
        border: 1px solid rgba(16, 185, 129, 0.35);
        color: #6ee7b7;
      }

      .status.error {
        display: block;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fca5a5;
      }

      .small {
        margin-top: 10px;
        color: #9ca3af;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Create account</h1>
      <p>This form calls <strong>/api/v1/auth/sign_up</strong>.</p>

      <form id="signup-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" />

        <label for="username">Username</label>
        <input id="username" name="username" type="text" minlength="3" maxlength="50" required />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          minlength="8"
          maxlength="128"
          required
          autocomplete="new-password"
        />

        <button id="submit-btn" type="submit">Sign up</button>
        <button id="sign-in-btn" type="button">Go to sign in</button>
      </form>

      <div id="status" class="status"></div>
      <div class="small">Password must include uppercase, lowercase, and a number.</div>
    </main>

    <script>
      const form = document.getElementById('signup-form');
      const signInBtn = document.getElementById('sign-in-btn');
      const submitBtn = document.getElementById('submit-btn');
      const statusEl = document.getElementById('status');

      function showStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
      }

      function extractErrorMessage(result) {
        const detailMessage = result?.error?.details?.[0]?.msg;
        return detailMessage || result?.error?.message || result?.message || 'Sign up failed. Please check your inputs.';
      }

      signInBtn.addEventListener('click', () => {
        window.location.href = '/sign-in';
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        showStatus('', '');

        const payload = {
          email: form.email.value.trim(),
          username: form.username.value.trim(),
          password: form.password.value,
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating...';

        try {
          const response = await fetch('/api/v1/auth/sign_up', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          const result = await response.json().catch(() => ({}));

          if (!response.ok || !result.success) {
            const message = extractErrorMessage(result);
            showStatus(message, 'error');
            return;
          }

          const accessToken = result?.data?.access_token;
          if (accessToken) {
            localStorage.setItem('access_token', accessToken);
          }
          setTimeout(() => {
            window.location.href = '/account';
          }, 500);
        } catch (error) {
          showStatus('Network error. Please try again.', 'error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign up';
        }
      });
    </script>
  </body>
</html>
