<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #1f2937, #111827 60%);
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #e5e7eb;
        padding: 20px;
      }

      .card {
        width: min(92vw, 600px);
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 24px;
        font-size: 1.8rem;
      }

      .user-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 32px;
        padding-bottom: 32px;
        border-bottom: 1px solid #374151;
      }

      .stat {
        display: flex;
        flex-direction: column;
      }

      .stat-label {
        font-size: 0.85rem;
        color: #9ca3af;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stat-value {
        font-size: 1.5rem;
        font-weight: 600;
      }

      .button-group {
        display: flex;
        gap: 16px;
        justify-content: center;
      }

      button {
        flex: 1;
        padding: 14px 24px;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(90deg, #3b82f6, #2563eb);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
      }

      button:hover {
        opacity: 0.9;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .status {
        margin-top: 14px;
        padding: 10px;
        border-radius: 10px;
        font-size: 0.9rem;
      }

      .status.error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fca5a5;
      }

      .logout-btn {
        background: linear-gradient(90deg, #ef4444, #dc2626);
        margin-top: 20px;
      }

      .logout-btn:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Account</h1>

      <div class="user-info">
        <div class="stat">
          <div class="stat-label">Username</div>
          <div class="stat-value" id="username">Loading...</div>
        </div>
        <div class="stat">
          <div class="stat-label">Level</div>
          <div class="stat-value" id="level">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">XP</div>
          <div class="stat-value" id="xp">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Points</div>
          <div class="stat-value" id="points">—</div>
        </div>
      </div>

      <div class="button-group">
        <button id="study-btn">Study Mode</button>
        <button id="solving-btn">Solving Mode</button>
      </div>

      <button class="logout-btn" id="logout-btn">Log Out</button>

      <div id="status" class="status" style="display: none;"></div>
    </main>

    <script>
      const token = localStorage.getItem('access_token');
      const statusEl = document.getElementById('status');

      async function loadUserData() {
        if (!token) {
          showError('No access token found. Redirecting to sign in...');
          setTimeout(() => {
            window.location.href = '/sign-in';
          }, 1500);
          return;
        }

        try {
          const response = await fetch('/api/v1/auth/current_user', {
            headers: { Authorization: `Bearer ${token}` },
          });

          const result = await response.json();

          if (!response.ok || !result.success) {
            showError('Failed to load user data. Redirecting to sign in...');
            setTimeout(() => {
              window.location.href = '/sign-in';
            }, 1500);
            return;
          }

          const user = result.data;
          document.getElementById('username').textContent = user.username || 'N/A';
          document.getElementById('level').textContent = user.level ?? '—';
          document.getElementById('xp').textContent = user.xp ?? '—';
          document.getElementById('points').textContent = user.points ?? '—';
          console.log(user.points)
        } catch (error) {
          showError('Network error. Please try again.');
        }
      }

      function showError(message) {
        statusEl.textContent = message;
        statusEl.className = 'status error';
        statusEl.style.display = 'block';
      }

      document.getElementById('study-btn').addEventListener('click', () => {
        alert('Study Mode - Coming soon!');
      });

      document.getElementById('solving-btn').addEventListener('click', () => {
        alert('Solving Mode - Coming soon!');
      });

      document.getElementById('logout-btn').addEventListener('click', async () => {
        if (!token) return;

        try {
          const response = await fetch('/api/v1/auth/log_out', {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
          });

          localStorage.removeItem('access_token');
          window.location.href = '/sign-in';
        } catch (error) {
          showError('Logout failed. Please try again.');
        }
      });

      loadUserData();
    </script>
  </body>
</html>
